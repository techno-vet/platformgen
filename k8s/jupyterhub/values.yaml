# PlatformGen JupyterHub Helm values
# Deploy: helm upgrade --install genny-hub jupyterhub/jupyterhub \
#           --namespace genny-hub --values k8s/jupyterhub/values.yaml

hub:
  baseUrl: "/"
  config:
    GitHubOAuthenticator:
      client_id: "REPLACE_GITHUB_CLIENT_ID"
      client_secret: "REPLACE_GITHUB_CLIENT_SECRET"
      oauth_callback_url: "https://platformgen.ai/hub/oauth_callback"
      scope:
        - read:user
        - user:email
      # Allow any GitHub user to log in (Stripe billing gates features, not auth)
      allow_all: true
    Authenticator:
      admin_users:
        - techno-vet
      allow_all: true
    JupyterHub:
      authenticator_class: github

  cookieSecret: "ae530f05583792733d764fbf9ae0af8c8899d5c54eaf2eefded6b29682932000"

  extraVolumes:
    - name: pg-templates
      configMap:
        name: platformgen-hub-templates

  extraVolumeMounts:
    - name: pg-templates
      mountPath: /etc/jupyterhub/templates

  extraConfig:
    platformgen: |
      # Route user pods into genny-users namespace
      c.KubeSpawner.namespace = "genny-users"
      # Give servers 3 minutes to become responsive after starting
      c.Spawner.http_timeout = 180
      c.Spawner.start_timeout = 300
      # User pods in genny-users can't resolve short "hub" hostname (different namespace).
      # Inject full FQDN so jupyterhub-singleuser can reach the hub API.
      c.KubeSpawner.hub_connect_url = "http://hub.genny-hub.svc.cluster.local:8081"
      c.KubeSpawner.environment = {
          'JUPYTERHUB_API_URL': 'http://hub.genny-hub.svc.cluster.local:8081/hub/api',
      }
      # Custom PlatformGen templates
      c.JupyterHub.template_paths = ['/etc/jupyterhub/templates']
      # Enable auth_state so we can pass the GitHub OAuth token to pods
      c.Authenticator.enable_auth_state = True
      # Inject GENNY_TIER (billing webhook updates this in Phase 3)
      from oauthenticator.github import GitHubOAuthenticator
      import urllib.parse
      class GennyAuthenticator(GitHubOAuthenticator):
          allow_all = True
          async def pre_spawn_start(self, user, spawner):
              auth_state = await user.get_auth_state()
              if auth_state:
                  spawner.environment['GITHUB_USER'] = user.name
                  spawner.environment['GENNY_TIER'] = 'free'
                  # Pass GitHub OAuth token so genny can use gh/copilot CLI
                  token = auth_state.get('access_token', '')
                  if token:
                      spawner.environment['GHE_TOKEN'] = token
                      spawner.environment['GH_TOKEN'] = token
              # Redirect to Genny web UI on spawn
              spawner.default_url = "/proxy/8889/"
      c.JupyterHub.authenticator_class = GennyAuthenticator
      c.Authenticator.admin_users = {'techno-vet'}

proxy:
  secretToken: "ae530f05583792733d764fbf9ae0af8c8899d5c54eaf2eefded6b29682932000"
  service:
    type: ClusterIP
  # Increase WebSocket timeout so noVNC doesn't get dropped (default is 300s)
  chp:
    extraCommandLineFlags:
      - "--no-x-forward"
      - "--no-prepend-path"
    extraEnv:
      CONFIGPROXY_WEBSOCKET_TIMEOUT: "3600"

singleuser:
  image:
    name: ghcr.io/techno-vet/platformgen-web
    tag: latest
    pullPolicy: Always
  storage:
    capacity: 1Gi
    dynamic:
      storageClass: local-path  # k3s default storage class
  startTimeout: 300
  cmd: "start-genny-web.sh"
  defaultUrl: "/proxy/8889/"
  extraEnv:
    OLLAMA_URL: "http://ollama.genny-shared.svc.cluster.local:11434"
    PLATFORMGEN_VERSION: "0.3.0"
    GENNY_WEB_PORT: "8889"

  profileList:
    - display_name: "🆓 Free"
      description: "Shared GPU queue, idle culled after 20 minutes"
      default: true
      kubespawner_override:
        cpu_limit: 2.0
        cpu_guarantee: 0.5
        mem_limit: "4G"
        mem_guarantee: "2G"
        environment:
          GENNY_TIER: "free"

    - display_name: "🔨 Builder — $19/mo"
      description: "Priority GPU queue, always-on pod"
      kubespawner_override:
        cpu_limit: 4.0
        cpu_guarantee: 1.0
        mem_limit: "8G"
        mem_guarantee: "4G"
        environment:
          GENNY_TIER: "builder"

    - display_name: "👥 Team — $99/mo"
      description: "Shared team workspace, 4 CPU, 8GB RAM"
      kubespawner_override:
        cpu_limit: 8.0
        cpu_guarantee: 2.0
        mem_limit: "16G"
        mem_guarantee: "8G"
        environment:
          GENNY_TIER: "team"

cull:
  enabled: true
  timeout: 1200      # 20 minutes for free tier
  maxAge: 0          # no hard max age
  every: 300         # check every 5 min
  concurrency: 5
  removeNamedServers: false

scheduling:
  userScheduler:
    enabled: false   # single node — no need to schedule across nodes

ingress:
  enabled: false   # We manually patch the existing platformgen ingress to add /hub

prePuller:
  hook:
    enabled: false   # skip pre-pull on single node (already have image locally)
  continuous:
    enabled: false
