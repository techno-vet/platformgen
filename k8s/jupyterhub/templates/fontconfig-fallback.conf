<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<fontconfig>
  <!-- Prefer Symbola as fallback for any sans-serif font missing glyphs.
       Symbola covers the full Unicode BMP in outline format, making it
       compatible with Xft/tkinter (unlike CBDT color emoji fonts). -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>DejaVu Sans</family>
      <family>Liberation Sans</family>
      <family>Noto Sans</family>
      <family>Symbola</family>
    </prefer>
  </alias>
  <alias>
    <family>monospace</family>
    <prefer>
      <family>DejaVu Sans Mono</family>
      <family>Liberation Mono</family>
      <family>Symbola</family>
    </prefer>
  </alias>
</fontconfig>
