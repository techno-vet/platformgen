<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genny AI SRE Platform — UI Showcase</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0d0d0d;
    color: #e0e0e0;
    font-family: 'Segoe UI', 'SF Pro Display', -apple-system, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  /* ── Header ── */
  #header {
    background: #1a1a2e;
    border-bottom: 1px solid #007acc;
    padding: 10px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  #header .logo {
    font-size: 1.3rem;
    font-weight: 700;
    color: #00d4ff;
    letter-spacing: 1px;
  }
  #header .logo span { color: #4ec9b0; }
  #header .meta { font-size: 0.75rem; color: #666; }

  /* ── Progress bar ── */
  #progress-bar {
    height: 3px;
    background: #1e1e1e;
    flex-shrink: 0;
  }
  #progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #007acc, #4ec9b0);
    transition: width 0.4s ease;
    width: 0%;
  }

  /* ── Main content ── */
  #main {
    flex: 1;
    display: flex;
    gap: 0;
    overflow: hidden;
    min-height: 0;
  }

  /* ── Screenshot pane ── */
  #img-pane {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #111;
    padding: 16px;
    position: relative;
    min-width: 0;
  }
  #slide-img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    border-radius: 6px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    transition: opacity 0.35s ease;
  }
  #slide-img.fading { opacity: 0; }
  #no-img {
    color: #444;
    font-size: 1rem;
    display: none;
  }

  /* ── Narration pane ── */
  #narration-pane {
    width: 320px;
    flex-shrink: 0;
    background: #161616;
    border-left: 1px solid #252525;
    display: flex;
    flex-direction: column;
    padding: 24px 20px;
    gap: 16px;
    overflow-y: auto;
  }
  #slide-num {
    font-size: 0.7rem;
    color: #007acc;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  #slide-title {
    font-size: 1.35rem;
    font-weight: 700;
    color: #ffffff;
    line-height: 1.3;
  }
  #slide-subtitle {
    font-size: 0.8rem;
    color: #4ec9b0;
    line-height: 1.4;
  }
  .divider {
    height: 1px;
    background: #252525;
  }
  #auger-label {
    font-size: 0.7rem;
    color: #9b59b6;
    font-weight: 600;
    letter-spacing: 1px;
  }
  #narration-text {
    font-size: 0.88rem;
    color: #c8c8c8;
    line-height: 1.7;
    flex: 1;
  }

  /* ── Controls ── */
  #controls {
    background: #111;
    border-top: 1px solid #1e1e1e;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .btn {
    background: #1e1e1e;
    border: 1px solid #333;
    color: #ccc;
    padding: 6px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.8rem;
    transition: all 0.15s;
  }
  .btn:hover { background: #2a2a2a; border-color: #007acc; color: #fff; }
  .btn.primary { background: #007acc; border-color: #007acc; color: #fff; }
  .btn.primary:hover { background: #0098ff; }
  .btn:disabled { opacity: 0.3; cursor: default; }
  #dots {
    flex: 1;
    display: flex;
    gap: 6px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #333;
    cursor: pointer;
    transition: background 0.2s;
  }
  .dot.active { background: #007acc; }
  .dot.visited { background: #4ec9b0; }
  #auto-btn {
    min-width: 80px;
  }
  #timer-bar {
    height: 2px;
    background: #1e1e1e;
    flex-shrink: 0;
    position: relative;
    overflow: hidden;
  }
  #timer-fill {
    position: absolute;
    left: 0; top: 0; height: 100%;
    background: #9b59b6;
    width: 0%;
    transition: none;
  }
  #slide-counter {
    font-size: 0.75rem;
    color: #555;
    min-width: 60px;
    text-align: right;
  }
</style>
</head>

const AUTO_INTERVAL = 8000; // ms per slide in auto mode
let current = 0;
let autoMode = false;
let autoTimer = null;
let timerAnim = null;

const imgEl       = document.getElementById('slide-img');
const noImgEl     = document.getElementById('no-img');
const numEl       = document.getElementById('slide-num');
const titleEl     = document.getElementById('slide-title');
const subEl       = document.getElementById('slide-subtitle');
const narrEl      = document.getElementById('narration-text');
const progressEl  = document.getElementById('progress-fill');
const counterEl   = document.getElementById('slide-counter');
const timerFill   = document.getElementById('timer-fill');
const dotsEl      = document.getElementById('dots');
const autoBtnEl   = document.getElementById('auto-btn');

// Build dots
SLIDES.forEach((_, i) => {
  const d = document.createElement('div');
  d.className = 'dot';
  d.onclick = () => goTo(i);
  dotsEl.appendChild(d);
});

function goTo(n, instant) {
  const prev = current;
  current = Math.max(0, Math.min(SLIDES.length - 1, n));
  const s = SLIDES[current];

  // Fade image
  imgEl.classList.add('fading');
  setTimeout(() => {
    if (s.img) {
      imgEl.src = s.img;
      imgEl.style.display = '';
      noImgEl.style.display = 'none';
    } else {
      imgEl.style.display = 'none';
      noImgEl.style.display = '';
    }
    imgEl.classList.remove('fading');
  }, instant ? 0 : 300);

  // Update narration panel
  numEl.textContent   = `WIDGET ${String(current+1).padStart(2,'0')} / ${String(SLIDES.length).padStart(2,'0')}`;
  titleEl.textContent = s.title;
  subEl.textContent   = s.subtitle;
  narrEl.textContent  = '';
  typeNarration(s.narration);

  // Progress + counter
  progressEl.style.width = `${((current+1)/SLIDES.length)*100}%`;
  counterEl.textContent  = `${current+1} / ${SLIDES.length}`;

  // Dots
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.className = 'dot' + (i === current ? ' active' : (i < current ? ' visited' : ''));
  });

  // Button states
  document.getElementById('prev-btn').disabled = current === 0;
  document.getElementById('next-btn').disabled = current === SLIDES.length - 1;
}

let typeTimer = null;
function typeNarration(text) {
  if (typeTimer) clearInterval(typeTimer);
  let i = 0;
  typeTimer = setInterval(() => {
    narrEl.textContent += text[i];
    i++;
    if (i >= text.length) clearInterval(typeTimer);
  }, 18);
}

function next() { goTo(current + 1); if (autoMode) resetTimer(); }
function prev() { goTo(current - 1); if (autoMode) resetTimer(); }

function toggleAuto() {
  autoMode = !autoMode;
  autoBtnEl.textContent = autoMode ? '⏸ Pause' : '▶ Auto';
  autoBtnEl.className   = autoMode ? 'btn' : 'btn primary';
  if (autoMode) {
    resetTimer();
  } else {
    clearTimeout(autoTimer);
    cancelAnimationFrame(timerAnim);
    timerFill.style.width = '0%';
  }
}

function resetTimer() {
  clearTimeout(autoTimer);
  cancelAnimationFrame(timerAnim);
  timerFill.style.width = '0%';
  const start = performance.now();
  function tick(now) {
    const pct = Math.min(100, ((now - start) / AUTO_INTERVAL) * 100);
    timerFill.style.width = pct + '%';
    if (pct < 100) {
      timerAnim = requestAnimationFrame(tick);
    }
  }
  timerAnim = requestAnimationFrame(tick);
  autoTimer = setTimeout(() => {
    if (current < SLIDES.length - 1) {
      goTo(current + 1);
      resetTimer();
    } else {
      toggleAuto(); // stop at end
    }
  }, AUTO_INTERVAL);
}

// Keyboard nav
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown' || e.key === ' ') { e.preventDefault(); next(); }
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')  { e.preventDefault(); prev(); }
  if (e.key === 'a' || e.key === 'A') toggleAuto();
  if (e.key === 'Home') goTo(0);
  if (e.key === 'End')  goTo(SLIDES.length - 1);
});

// Init
goTo(0, true);
</script>
</body>
