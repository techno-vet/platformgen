# Google Chat webhook URLs
# Replace these example URLs with your own space webhooks.
# Get your webhook URL from: Google Chat Space > Manage webhooks

webhooks:
- name: MY_CHANNEL
  url: https://chat.googleapis.com/v1/spaces/YOURSPACEID/messages?key=YOUR_KEY&token=YOUR_TOKEN
  description: My Google Chat Channel
- name: GENNY
  url: https://chat.googleapis.com/v1/spaces/YOURSPACEID2/messages?key=YOUR_KEY&token=YOUR_TOKEN2
  description: Ask Genny Channel
